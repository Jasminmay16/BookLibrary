services:
  db:
    image: postgres:16-alpine
    container_name: booklibrary-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  backend:
    build: ./backend
    container_name: booklibrary-backend
    env_file:
    - .env
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    build: ./frontend
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: 3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: